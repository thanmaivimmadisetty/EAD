<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .buttons{
            display: grid;
            grid-template-columns: repeat(4,60px);
            grid-gap: 10px;
            

        }
        .display{
            border:2px solid black;
            padding:25px;
            font-size: large;
            
            max-width: 100%;

        }
        .calculator{
            border:4px solid black;
            padding:25px;
            height:420px;
            width:300px;
            background-color: rgb(110, 109, 114);
            border-radius:10px;
            margin-top:100px;
        }
        button{
            height:60px;
            width:60px;
            border:3px solid black;
            border-radius:8px;
        }
        .row1{
           background-color: yellow;
        }
        .equal{
            background-color: green;
        }
        .col1{
            background-color: skyblue;
        }
        button:hover{
            background-color: lightgray;
        }
        body{
            background-color: salmon;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="display" id="display">
        <br><br>
        <div class="buttons">
             <button class="clear row1">C</button>
             <button class="row1">(</button>
             <button class="row1" >)</button>
             <button class="col1" >/</button>
             
             <button >7</button>
             <button >8</button>
             <button >9</button>
             <button class="col1" >*</button>
             
             <button >4</button>
             <button>5</button>
             <button >6</button>
             <button class="col1">-</button>
             
              <button>1</button>
              <button >2</button>
              <button >3</button>
              <button class="col1">+</button>
            
              <button >0</button>
              <button >.</button>
              <button class="equal">=</button>
        </div>
    </div>
</body>
</html>
