<!DOCTYPE html>
<html>
<head>
    <title>Chess Board - Clean Version</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .board {
            display: flex;
            flex-direction: column;
            border: 4px solid black;
        }
        .row {
            display: flex;
        }
        .square {
            width: 70px;
            height: 70px;
        }
        .row:nth-child(odd) .square:nth-child(odd) {
            background-color: white;
        }

        .row:nth-child(odd) .square:nth-child(even) {
            background-color: black;
        }
        .row:nth-child(even) .square:nth-child(odd) {
            background-color: black;
        }
        .row:nth-child(even) .square:nth-child(even) {
            background-color: white;
        }

    </style>
</head>

<body>

<div class="board">

    <!-- 8 Rows -->
    <div class="row">
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
    </div>

    <div class="row">
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
    </div>

    <div class="row">
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
    </div>

    <div class="row">
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
    </div>

    <div class="row">
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
    </div>

    <div class="row">
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
    </div>

    <div class="row">
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
    </div>

    <div class="row">
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div>
    </div>

</div>

</body>
</html>
