<!DOCTYPE html>
<html>
<head>
    <title>Student Card Layout</title>

    <style>
        body {
            background-color: #f2f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 320px;
            background-color: white;
            border-radius: 12px; /* Rounded corners */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15); /* Shadow */
            padding: 20px;
            text-align: center;
        }

        .card h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            font-style: italic;
        }

        .card button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .card button:hover {
            background-color: #2980b9;
        }

    </style>
</head>

<body>

<div class="card">
    <h2>Web Development Course</h2>
    <p>
        Learn HTML, CSS, and JavaScript to build modern and responsive websites.
        Perfect for beginners and intermediate learners.
    </p>
    <button>Enroll</button>
</div>

</body>
</html>
