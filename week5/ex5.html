<!doctype html>
<html>
  <head>
    <title>Employee Payroll System</title>
    <style>
      body {
        background-color: #e6f2ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
      }

      .container {
        background-color: white;
        padding: 50px;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
        width: 350px;
      }

      h2 {
        text-align: center;
      }

      input {
        width: 100%;
        padding: 8px;
        margin: 10px 0;
      }

      button {
        width: 100%;
        padding: 15px;

        background-color: green;
        color: white;

        border: none;
        border-radius: 5px;

        cursor: pointer;
        margin-top: 20px;
      }

      .result {
        margin-top: 15px;
        font-weight: bold;
        color: brown;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Employee Salary Calculator</h2>

      <input type="text" id="name" placeholder="Enter Employee Name" />
      <input type="number" id="basic" placeholder="Enter Basic Salary" />

      <button onclick="calculateSalary()">Calculate</button>

      <div class="result" id="output"></div>
    </div>

    <script>
      // Constructor Function with Default Parameters
      function Employee(name, basicSalary, hra = 2000, ta = 1000) {
        this.name = name;
        this.basicSalary = basicSalary;
        this.hra = hra;
        this.ta = ta;

        // Object Method
        this.calculateNetSalary = function () {
          let grossSalary = this.basicSalary + this.hra + this.ta;
          let tax = grossSalary * 0.1;
          let netSalary = grossSalary - tax;

          return {
            grossSalary: grossSalary,
            tax: tax,
            netSalary: netSalary,
          };
        };
      }

      function calculateSalary() {
        let name = document.getElementById("name").value;
        let basic = parseFloat(document.getElementById("basic").value);

        if (name === "" || isNaN(basic)) {
          document.getElementById("output").innerHTML =
            "Please enter valid details.";
          return;
        }

        let emp = new Employee(name, basic);
        let salaryDetails = emp.calculateNetSalary();

        document.getElementById("output").innerHTML = `
            Employee Name: ${emp.name} <br>
            Gross Salary: Rs.${salaryDetails.grossSalary} <br>
            Tax (10%): Rs.${salaryDetails.tax} <br>
            Net Salary: Rs.${salaryDetails.netSalary}
        `;
      }
    </script>
  </body>
</html>
